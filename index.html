<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moda ECCI - Espacio Creativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --vintage-bg: #fdfaf4; --vintage-card-bg: #f4e7d3; --vintage-dark: #1b2421; --vintage-orange: #e76f51; --vintage-yellow: #f4a261; --vintage-teal: #2a9d8f; --vintage-blue: #1d3557; --vintage-crimson: #e63946; }
        body { background-color: var(--vintage-bg); color: var(--vintage-dark); font-family: 'Segoe UI', system-ui, sans-serif; }
        .navbar-glass { background-color: var(--vintage-bg); border-bottom: 3px solid var(--vintage-dark); }
        .hero-gradient { background: linear-gradient(135deg, var(--vintage-yellow), var(--vintage-orange)); padding: 80px 0; border-bottom: 4px solid var(--vintage-dark); }
        .card-glass { background-color: var(--vintage-card-bg); border: 3px solid var(--vintage-dark) !important; border-radius: 12px; box-shadow: 5px 5px 0px var(--vintage-dark); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="#"><i class="bi bi-palette-fill" style="color: var(--vintage-orange);"></i> MODA ECCI x ADSO</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-dark fw-bold" href="#inicio">Inicio</a>
                <a class="nav-link text-dark fw-bold" href="#experiencia">Experiencia</a>
                <a class="btn btn-dark btn-sm fw-bold px-3" href="glossary.html">Glossary</a>
            </div>
        </div>
    </nav>

    <header id="inicio" class="hero-gradient text-center">
        <div class="container">
            <span class="badge bg-dark fs-4 px-4 py-3 rounded shadow-sm">SARA VILORIA</span>
            <h1 class="display-4 fw-black text-uppercase mt-3">El Color es un Lenguaje Caprichoso</h1>
        </div>
    </header>

    <main class="container my-5">
        <section id="experiencia" class="my-5">
            <h2 class="text-center fw-bold mb-5">Mi Experiencia con el Color</h2>
            <!-- Galería de 17 proyectos -->
            <div class="row g-3">
                <script>
                    for (let i = 1; i <= 17; i++) {
                        document.write(`
                            <div class="col-6 col-md-4 col-lg-3">
                                <div class="card card-glass h-100 p-1">
                                    <img src="image_09bf5d.png" alt="Proyecto ${i}" class="img-fluid rounded" style="aspect-ratio: 1/1; object-fit: cover;">
                                </div>
                            </div>
                        `);
                    }
                </script>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
