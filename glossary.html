<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Glossary | MODA ECCI x ADSO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --vintage-bg: #fdfaf4; --vintage-card-bg: #f4e7d3; --vintage-dark: #1b2421; --vintage-blue: #1d3557; }
        body { background-color: var(--vintage-bg); color: var(--vintage-dark); font-family: 'Segoe UI', system-ui, sans-serif; }
        .card-glass { background-color: var(--vintage-card-bg); border: 3px solid var(--vintage-dark) !important; border-radius: 12px; margin-bottom: 15px; cursor: pointer; }
        .term-definition { display: none; padding: 15px; border-top: 2px solid var(--vintage-dark); }
        .card-glass.active .term-definition { display: block; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-light border-bottom border-3 border-dark sticky-top">
        <div class="container">
            <a class="navbar-brand text-dark fw-bold" href="index.html"><i class="bi bi-arrow-left"></i> Volver al Inicio</a>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 800px;">
        <h2 class="text-center fw-black mb-5">Technical Glossary</h2>
        <script>
            const terms = [
                {t: "Color theory", tr: "Teoría del color", d: "Reglas y lineamientos científicos y artísticos."},
                {t: "Color wheel", tr: "Círculo cromático", d: "Representación circular que organiza los colores."},
                {t: "High contrast", tr: "Alto contraste", d: "Relación de color opuesta que inyecta energía."},
                {t: "Low contrast", tr: "Bajo contraste", d: "Combinación sutil basada en matices cercanos."},
                {t: "Color psychology", tr: "Psicología del color", d: "Estudio de las respuestas emocionales ante la luz."},
                {t: "Hue", tr: "Matiz / Tono", d: "Propiedad pura del color."},
                {t: "Chroma", tr: "Croma / Pureza", d: "Atributo de intensidad o saturación."},
                {t: "Complementary", tr: "Complementarios", d: "Colores en extremos opuestos del círculo."},
                {t: "Analogous", tr: "Análogos", d: "Colores vecinos que conviven sin tensión."},
                {t: "Triad", tr: "Tríada", d: "Tres colores espaciados simétricamente."},
                {t: "Monochromatic", tr: "Monocromático", d: "Un solo color base con variaciones de luz."},
                {t: "Tetrad", tr: "Tétrada", d: "Cuatro colores distribuidos en pares."},
                {t: "Visual perception", tr: "Percepción visual", d: "Capacidad para interpretar estímulos."},
                {t: "Color semiotics", tr: "Semiología del color", d: "Interpretación como sistema de signos."},
                {t: "Color nomenclature", tr: "Nomenclatura", d: "Sistemas para catalogar tonos exactos."}
            ];

            terms.forEach(item => {
                document.write(`
                    <div class="card-glass" onclick="this.classList.toggle('active')">
                        <div class="p-3 d-flex justify-content-between">
                            <span class="fw-bold fs-5">${item.t} <span class="badge bg-primary">${item.tr}</span></span>
                            <i class="bi bi-chevron-down"></i>
                        </div>
                        <div class="term-definition fw-semibold">${item.d}</div>
                    </div>
                `);
            });
        </script>
    </div>
</body>
</html>
